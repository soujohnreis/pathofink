<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Path of Ink — A Calligraphy Action Ritual for iOS</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel compiler for JSX -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <!-- Fonts: Playfair Display for calligraphy elegance, Inter for clean modern reading UI -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,600&display=swap"
    rel="stylesheet" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background-color: #09090b;
      color: #f4ebd0;
    }

    .font-serif-elegant {
      font-family: 'Playfair Display', 'Georgia', serif;
    }

    /* Ancient grainy parchment texture overlay */
    .parchment-grain {
      background-image: radial-gradient(rgba(26, 26, 26, 0.15) 1px, transparent 0), radial-gradient(rgba(26, 26, 26, 0.1) 1px, transparent 0);
      background-size: 8px 8px;
      background-position: 0 0, 4px 4px;
    }

    /* Premium custom scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #09090b;
    }

    ::-webkit-scrollbar-thumb {
      background: #272421;
      border-radius: 5px;
      border: 2px solid #09090b;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #d9381e;
    }

    /* Dynamic calligraphy brush stroke highlight */
    .brush-highlight {
      position: relative;
      z-index: 1;
    }

    .brush-highlight::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: -10px;
      right: -10px;
      height: 12px;
      background-color: #d9381e;
      opacity: 0.35;
      z-index: -1;
      border-radius: 30% 70% 70% 30% / 50% 30% 70% 50%;
      transform: rotate(-1.5deg);
    }

    /* Subtle gold pulsing loop for main buttons */
    @keyframes goldGlow {

      0%,
      100% {
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
      }

      50% {
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
      }
    }

    .gold-glow-btn {
      animation: goldGlow 3.5s infinite;
    }

    /* Entrance Animations on Load */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Viewport reveal utilities */
    .reveal-on-scroll {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal-on-scroll.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useEffect, useRef, useState, useMemo } = React;

    // Color specifications matching the game's core theme
    const COLORS = {
      paper: "#f4ebd0",
      ink: "#1a1a1a",
      wall: "#272421",
      red: "#d9381e",
      gold: "#d4af37",
      muted: "#7b6d53",
    };



    function InteractiveZenScroll() {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [brushColor, setBrushColor] = useState("#1a1a1a");
      const [brushSize, setBrushSize] = useState(13);
      const lastPos = useRef({ x: 0, y: 0 });

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        // Draw standard visual framing lines for calligraphy
        ctx.strokeStyle = "rgba(26, 26, 26, 0.08)";
        ctx.lineWidth = 1;
        ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
      }, []);

      // Helper to precisely scale cursor coordinates to raw Canvas bounds
      const getCanvasCoords = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return { x: 0, y: 0 };
        const rect = canvas.getBoundingClientRect();

        const clientX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
        const clientY = e.clientY || (e.touches && e.touches[0].clientY) || 0;

        // Cross-multiply bounds width/height ratio to map screen coordinate mapping with Canvas resolution
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);

        return { x, y };
      };

      const startDrawing = (e) => {
        const coords = getCanvasCoords(e);
        setIsDrawing(true);
        lastPos.current = coords;
      };

      const draw = (e) => {
        if (!isDrawing) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        const coords = getCanvasCoords(e);

        // Brush dynamics: faster movement produces thinner elegant lines
        const dx = coords.x - lastPos.current.x;
        const dy = coords.y - lastPos.current.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const speed = Math.min(dist, 18);
        const dynamicWidth = Math.max(2.5, brushSize - speed * 0.45);

        ctx.beginPath();
        ctx.strokeStyle = brushColor;
        ctx.lineWidth = dynamicWidth;
        ctx.moveTo(lastPos.current.x, lastPos.current.y);
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();

        // Spawn splatter elements occasionally during fast strokes
        if (speed > 13 && Math.random() > 0.6) {
          ctx.fillStyle = brushColor;
          ctx.beginPath();
          ctx.arc(
            coords.x + (Math.random() - 0.5) * 18,
            coords.y + (Math.random() - 0.5) * 18,
            Math.random() * 3 + 1,
            0,
            Math.PI * 2
          );
          ctx.fill();
        }

        lastPos.current = coords;
      };

      const clearCanvas = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "rgba(26, 26, 26, 0.08)";
        ctx.lineWidth = 1;
        ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
      };

      return (
        <div className="relative border-4 border-neutral-800 bg-[#f4ebd0] rounded-3xl p-5 shadow-2xl overflow-hidden text-neutral-900 max-w-2xl mx-auto">
          <div className="absolute -top-1 left-1/2 -translate-x-1/2 w-[95%] h-3 bg-amber-950 rounded shadow-md z-10" />

          <div className="mb-4 flex flex-wrap gap-3 items-center justify-between">
            <div className="flex flex-col">
              <span className="font-serif-elegant font-black text-lg tracking-wide text-neutral-900">Interactive Zen Brush Scroll</span>
              <span className="text-xs text-neutral-500 font-semibold italic">Paint calligraphic strokes directly on raw parchment</span>
            </div>
            <div className="flex gap-2">
              {["#1a1a1a", "#d9381e", "#d4af37", "#1e3a8a"].map((color) => (
                <button
                  key={color}
                  onClick={() => setBrushColor(color)}
                  style={{ backgroundColor: color }}
                  className={`h-6 w-6 rounded-full border border-neutral-400 transform transition-transform hover:scale-125 ${brushColor === color ? "ring-2 ring-neutral-900" : ""}`}
                />
              ))}
            </div>
          </div>

          <canvas
            ref={canvasRef}
            width={600}
            height={320}
            onMouseDown={startDrawing}
            onMouseMove={draw}
            onMouseUp={() => setIsDrawing(false)}
            onMouseLeave={() => setIsDrawing(false)}
            onTouchStart={startDrawing}
            onTouchMove={draw}
            onTouchEnd={() => setIsDrawing(false)}
            className="w-full bg-[#f4ebd0] border border-[#e4d4ad] rounded-xl cursor-crosshair touch-none shadow-inner"
          />

          <div className="flex justify-between items-center mt-3 text-xs text-neutral-600 font-medium">
            <span>Hold left click or slide finger to draw brush marks.</span>
            <button
              onClick={clearCanvas}
              className="px-4 py-2 bg-[#1a1a1a] hover:bg-neutral-800 text-[#f4ebd0] font-black rounded-lg transition active:scale-95"
            >
              Reset Scroll
            </button>
          </div>
        </div>
      );
    }
